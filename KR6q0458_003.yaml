body:
  text: 門人興林等編機緣僧禮拜師云何處來僧云金陵師云有甚公幹僧云聞和尚在這裏師云何處得此消息僧云爭奈臭名在外師云這蒼蠅僧問如何是本來面目師云你看山僧有幾莖眉僧云請和尚自道師云山僧欲自道只是無著口處僧云在學人分上有幾莖師云打失也不知僧問如何是和尚家風師云凌霜傲雪峰同老嘯月吟風眼倍空僧云百年後向甚麼處師云天不容地不載僧云恁麼則藏身之處沒蹤跡師云隆冬嚴寒將錢買火向僧云學人不會師云待汝夢見山僧來僧問如何是在窟獅子師乃良久僧云如何是出窟獅子師震威一喝僧云如何是咬人獅子師劈面便掌僧問大修行人還落因果也無師云落即不落昧則不昧僧云前後百丈被師一口吞卻師云這野狐精僧問南泉斬貓意旨如何師云活人屋裏死人無數僧云畢竟何過師云終日飲血噉肉不知身是羅剎僧云趙州頂草鞋出又作麼生師云取笑傍觀居士問時人以錢財為貴沙門以何為貴師云以貧為貴士云貧有何貴師云不作守庫奴僧問如何是向上一路師云五老峰高僧云如何至頂師云看腳下僧云不涉途程峰頭已到師云縱能玄會得終不及親臨僧云和尚可曾親到否師云舉身天地外別是一乾坤僧問達磨西來所為何事師云直指單傳僧云直指個甚麼師云烏龜是鱉僧云單傳個甚麼師云秤錘是銕僧云喚作佛法意得麼師云入地獄如箭射僧云不喚作時如何師云拔舌犁耕一婆子禮師足師云新年頭事如何婆云未曾過這邊師云莫在那邊麼婆云那邊亦不住師云即今在甚麼處婆擬議師便與一掌婆作禮云和尚恩大難酬師復一咄僧問如何是佛師云莫污老僧耳僧云如何是法師云撮土揚塵僧云如何是僧師云逞甚伎倆僧云如何是一體三寶師云問話了禮拜去僧問十方薄伽梵一路涅槃門如何是涅槃門師云旋出旋入僧問有物先天地無形本寂寥能為萬象主不逐四時凋請問和尚畢竟是個甚麼師云死貓頭僧云還成得佛麼師云驢年去僧問殃屈救產意旨如何師云佛口所生子僧云因甚前不早後不遲師云時節一至其理自彰僧云畢竟功歸阿誰師云恰恰僧問大通智勝佛十劫坐道場佛法不現前不得成佛道如何是佛法師云清涼山高洛伽水深僧云如何是佛道師云昨日有人從粵東來說吳西山水佳奇大好翫賞僧云未現前時如何師云描不成畫不就僧云已現前時如何師云塞壑填溝僧問乾屎橛意旨如何師云你還咬著麼僧云我嘗於此切師云不是好狗僧云為甚麼不肯學人師云猶有這個在僧問大慧禪師道喚作竹篦子則觸不喚作竹篦子則背不得下語不得無語速道速道師云山僧不道僧云因甚不道師云我不為蛇添足僧問萬法歸一一歸何處師云雲居蘿苩洞山薑僧云學人不會師云你若會賣美去在僧問如何是佛祖的的意師云虎鬚林裏撒珍珠僧罔測師云風不入無孔之壁僧問某甲久嚮名德自遠親近師云大有人墮坑落塹僧云乞師一接師云甚處來僧云南嶽師云聞祝融峰𨁝跳上三十三天是否僧無語師云虛費草鞋錢僧問如何是鐵牛機師便打僧云如何是悄然機師便喝僧云如何是圓通機師云山僧這裏無剩語僧禮拜云領師云領你爺領你娘僧問心心莫測時如何師云你是阿誰僧云說似一物則不中師云即汝不說時又作麼生僧云體露堂堂本現成師云百草頭上薦得底猶是向外馳求僧問去聖時遙人心不古如何得無過失身語意業師云我嘗於此切僧云如何是露地白牛師云你有甚麼蓋覆僧云得者如何師云不踏生草僧云還落異類也無師云曾在雲居種田博飯師在巖前立忽見一老者問好座巖龕只是無佛師云佛則有只是無人禮拜者云既有佛為甚不禮拜師云不識者即禮拜師云三十年為僧今日被俗人覷破一童子問道也者不可須臾離也可離非道也離與不離則不問如何是道師云把燈覓火子云孔氏之道與釋氏之道有同別乎師云一以貫之三僧入室作禮師云甚處來一僧云翠巖來師云聞翠巖新佛是地藏化身果否僧無語師云不會出去又問一僧你從何來僧云圓通師云死貓頭解咬鼠否僧無語師亦云不會出去一僧云某甲記得一則機緣請問和尚師云舉看僧云昔有施主婦人入寺行隨年錢一僧云聖僧前著一分婦人云聖僧年多少僧無語請和尚代一語師云你有多少錢僧無語師云兩個死漢一坑埋卻僧問佛佛相授祖祖相傳未審傳授個甚麼師云你知我見僧云既是知見一如何用指龜為鱉師云劍逢烈士贈琴遇知音彈一僧入室作禮云某甲自遠趨風而來乞和尚指示師云將你遠趨底風道看僧云聞和尚居山歲久少情識多孤高說法不帶枝葉師云遠賺你來何處人氏僧云廣東師云曾到曹溪否僧云曾到師云聞靈通小師慣顛酒是否僧云是師云既是靈通因甚麼卻被酒顛僧無語師云投子道底室中垂語欲明此事先淨其心心一清淨此事現成喻如磨鏡垢盡明見淨心之方無逾放下為玅故云節儉放下最為入道之捷徑言放下者不獨教汝放下世間根身器界法要將出世間菩提涅槃法也要放下若單放下世間法但去麤塵細垢猶在仍於此心不得清淨并將出世間法一總放下盡除細垢其心圓淨經云淨極光通達是也再將放下俱空不住空相深入玅淨無礙境界入此境界動靜不二一任搬柴運水送客迎賓種種方便應現權實猶如波中明月逆順皆圓頂上神珠縱橫自在非離非即無去無來久應暫現皆是無作妙力自然成就所以道其心淨而此事明矣至道平常不犯周折至理直捷不假巧說昔趙州問南泉如何是道泉云平常心是道又有僧問一老宿如何是至理宿云家常話是至理難道古人不會說沒學問為甚發言出語最夷坦最親切直下替人斬斷命根當時古尊宿若用些華言巧語打發學人斷不能容至今日聞之如甘露懷之如父母也誰知近代已來道風大變勿論老成後生有解無解但有些因緣福報底稱善知識一見學人來問佛法便道一聯粉飾語一陞堂說法單用文詞莊點全無直捷使聞者渀蕩浩瀚不解所歸返記取許多閒言閒語惑亂心懷如是行事忽略古風欺瞞後進豈善知識為人乎昔靈源謂圜悟曰學者雖有見道之資若不深蓄厚養發用必峻暴非特無補教門將恐有招禍辱當時此話師為圜悟勤說殊不知借圜悟名發揮後世之敝病耳蓋古人道德學問蘊於胸中惟恐人知惟怕人見癡癡呆呆二三十年潛於林下不露圭角事不獲已吐出一言半句自出平常人獲之為至寶所以相傳綿遠不絕者此矣今人則不然纔入門墻一角尚未踏著便云我是衲僧竊得古人一知半見挂於口唇當作實法會惟恐人不知我之長處我知差勝於人高懷我慢下視諸方至於陞堂臨眾如自鳴鐘不待參扣胡說亂道不害恥羞嗟乎是輩又不止於招禍辱壞叢林而已禪道佛法不獨古人有之今人亦有之要在各人苦心不苦心耳歷觀古人心性淳和識見深遠根器堅利為人真實為重法故尚有捨身斷臂底陸沉賤役底三十年不睡底八十歲行腳底如是種種心行不能備舉即如世尊為求法故觀三千大千世界乃至無有如芥子許非是菩薩捨身命處而況今之凡夫心性狂亂識見偏淺根器頑鈍立行不遠操心非實設或稍有一些資質底不但就不肯低頭行行不肯捨己從人不肯虛心請益不肯確志參方又要穿好底喫好底用好底貪求無猒自家一毛也不捨拔乃至一人也未曾見禪道佛法從誰而得生死苦海憑何而超良可歎夫明昧無二見是非在一心不肖者背明以投暗逐是非而轉流惟達道賢者了明亦非暗遂不被其所惑如星之明月出則昏月固勝星日上則昧觀日之光輝更勝星月雲屯則晦如是三光照世於萬象中可謂最明者也尚不能無相傾凌滅之障人欲免賢不肖是非毀譽之譏豈可得乎惟太虛空三者明虛空未嘗明三者暗虛空未嘗暗何以故體非群相而不拒彼諸相發揮識此則是非不能動其心毀譽莫能移其志何明昧之有耶世間欲做好人者不須用許多奇特只是一味依老負實足矣凡所依人既老誠所行事既負實雖學解不博言行粗淺歲月深久其好人之名不待求而自播矣設友不法之輩行非理之事縱能多聞強記巧語花詞賣淨嘴於人前欲求個好字猶如撥火尋冰恐終身難得也有能言行兼至聲實並真底則當今之古聖又不止於好字中列參究一門乃是吾人了生脫死轉凡成聖最要緊底一件本分大事且如來為發上乘心者說為發最上乘心者說兄弟們有具最上乘根器底向父母未生前早已會得此事世尊猶在下風若具上乘根器底向一言之下瞥地無疑不妨與佛把臂並行其或根器稍中底一聞此事疑信兼懷此雖去佛不遠終恐難見矣若是根器下劣底縱多聞而亦不信名之為捨父逃走向外乞丐枉受貧窮之流逐日家偷工那夫向星火螢光下竊看些今人語錄強記些古德機緣廣學些口頭三昧做成個拴驢椿風擺柳底樣子以為見人之招牌纔入叢林不辨高下就去說道說禪種種多事猒氣噴人聲色可惡嗟乎是輩真法門難除之巨病誠波旬眷屬再來也從上佛祖千言萬語總是一語於一語中盡含一切於一切語究竟將來無非為一大事因緣故經云唯此一事實餘二則非真兄弟們果能於日用中時時刻刻將此一大事因緣頓在目前如銀墻鐵壁蘊於胸中似殺父冤仇於茶裏飯裏至睡夢裏也放他不過於法法上觀察法法上不著如鏡照像來無所粘過無蹤跡虛受照應唯此能照能用不粘不染底一點仇恨未了只待時節而已時節一至徹底冰消乃可與道相應工夫果實到此始信自心是佛心外無佛一切語言從我流出我亦本空不住空相任運騰騰縱橫無礙可謂大解脫場無事道人也其或未能一任熟翻三藏博究五宗咬文嚼字說相離言總不出流識分別作解依他名為喫剩飯漢不知餿酸莫向人前弄嘴若論做工夫中底事無他第一最初入門寧可不遇人不可遇錯人寧可不用心不可用錯心若遇人錯受彼非法古謂雜毒入心殆不可救果遇作家宗師將胸中餘蘊盡向他傾心吐出隨彼洗滌陳習所授一法受於胸中如丁入木縱使千斤萬力也拔不出立志一定又要辦一個上好底常遠心盡其形壽切切做去一年不悟看一年十年不悟看十年何怕百年若不悟只如是看看來看去如生冤家總不見有身心世界盡十方虛空渾是一個生死冤家看克塞諸佛鼻孔克塞祖師咽喉克塞人天眼目任他諸佛出氣不得任他祖師開口不得任他人天覷著不得工夫到此一半得力切忌不可停參不可認悟更要就此提起精采從新做起向他開口不得處參向他出氣不得處究向他覷著不得處看一看看到心思不能智照不及處即此生死冤家亦無地安頓遇時遇節輕觸一下豁然迭落始見自心乾乾淨淨本有風光圓洞發明則一生參學事畢乃可號令人天訶責佛祖可不負最初一念成有終始也真實為生死底人不必苦苦如蠹魚死鑽故紙縱鑽出頭秪益生死與無生死了不相涉何故由汝無始迷失本心妄認生滅為不生滅積習濃厚逐念流轉及至於今未曾停息如今欲將無始生滅和盤拓轉歸不生滅又去向紙上多尋方便更增生滅耳故圓覺云末世眾生希望成道不務修行惟益多聞增長我見不若固守一法最為高上或念一菩薩名或專一如來號或參一話頭或持一經咒一發此心萬夫難拔總不管他有利益無利益有靈驗沒靈驗出得生死出不得生死捨著十年二十年至於一生不想做人隱於深山草衣木食樹立岩棲只管磨煉去磨到情塵消落一念純真時始知出生死法元不在紙上紙上說底是出生死底路非是無生死雖一念子未忘不妨於日用中更加精力單看這一念子從何起是誰念看來看去心光洞圓此一念子當下冰消瓦解影跡無存方為盡斷生死成無上道卻來回觀生無生法猶如夢事但有言說都無實義禪之一字孰不欲聞聞則通身潰爛若有一些好肉即是禪之不到處近觀諸方禪和子毒氣深入底如春雨皮膚脫落底似冬雷大都是帶病傳方以症救症斯不惟不瘥本病更增他疾耳學者尋師訪友先具擇法正眼得不被人所惑然後親師則師無不真求友則友無不賢苟未具此目雖有志氣超古人智愚不分邪正不辨但以求法心勝錯亂聞名未免不被聲色流轉古謂打頭不遇作家到老還成骨董李心老宿行年六旬自唪藥師經延壽索予開示迺書此示之壽命生於夙世道德辦於一生道德如水月壽命似漚光光非離月而生漚非水外而有漚之起滅延促無停水性不二光之明昧圓缺雖殊月體是一故知水月之本固同漚光之末自異耳人多棄本逐末圖起滅之漚光苟延歲月虛喪光陰道無聞於今後德非利於自他辜惜長庚於世無益何異夭亡耶夫達本之士了漚光之不實念壽命之非堅一出頭來心無二事惟慮道之不成德之未辦工夫日倍於年溫寒不計時節一旦遂其所志斬新做人堪為此生之明鑒後世之良軌縱使夭亡於中何愧與諸喫生受飯處養老堂逐境隨流輩誠日劫相倍矣故先聖云壽命可夭道德不可缺今古有壽德兼隆本末一致者若非寶掌出世即彌陀再來復何疑佛制佛子不得妄語有四其最大者未得謂得未證謂證故犯者波羅夷罪雖佛再出世亦不能懺悔故古之尊宿室中不妄許可以遵奉佛旨若此末法僧輩去佛日遠心行違縱勿論有識無識皆承上遺風稱善知識濫廁法庭匡徒領眾立序分寮往往向東堂云西堂今日有幾人省發向西堂云東堂今日有幾人啟悟彼此誑說雖曰互相激勵其瞞人昧己大妄語業難免矣惡聲遠播人皆猒聞非但不生信敬返起謗法之罪孰之過歟嗚呼今之善為人師者深可為誡能參學者防此一著僧問清淨本然云何忽生山河大地師云山河大地云何忽生清淨本然僧無語良久重請開示師云清淨本然即汝心也山河大地亦汝心也皆非別物心生則山河大地隨處建立心滅則十方世界當處消殞生滅如幻殞立如泡二俱虛妄了不可得向這裏見透要會前話也不難僧問古人道即心即佛是否師云是與不是門外之遶這裏用不著僧云請示堂奧師咳嗽一聲僧罔測至夜請開示師云佛者覺也心即覺之體也若自覺此心本來是佛名自利德復覺他心亦復如是名利他德併覺心佛眾生三無差別名圓覺德圓覺即如來分覺即菩薩不覺即凡夫若能一念迴光返照見自本心佛之一字猶成剩語況自他乎對客夜話未到這裏雲翻水動已到這裏風恬浪靜擊碎淨缾空合空剔起眉毛鏡照鏡我以不言言君將無聽聽竟夜盤桓松韻寒不落人間情與夢小佛事為傳心臨庄主秉炬昔年受用今日不同今日受用昔年不同昔年受用通身泥水今日受用滿面風光絕承當處切忌承當好備辦時且須備辦花朝二月雨淋頭脫下簑衣圖自在雖然是忙裏偷閒要且知大成必有大壞山僧今日助汝光明雲居峰頭柴不用買便燒為內堂主秉炬拈火炬云千峰茆浪一溪水聲說法不在簸舌搖唇截流豈假揮戈舞刃元字腳尚不存何語言之有此是虔州人末後消息向雲居竹竿頭上據款結案去也遂擲火炬云陽燄燒天影跡無空花火裏翻觔斗為衍南大師設奠拈香云雙雙寒鴈同日南飛山高海闊南北東西雲居雖與你同條生且不與你同條死生也倚天長劍逼人寒死也鴈過長空連影去是則相別多途猶記陳年面孔爐香清茗且無道話之奇夜月流星獨唱還鄉之曲為紫竹林萬白大師封龕長水孤舟一月來未曾出戶已安排全身送放千峰頂不向平常地上埋恭惟竹林堂上萬公大師生前末後所為因緣今向雲居一毫端頭據款結案去也大眾看看隨聲掩龕云鐵壁銀山蹤影絕木人夜聽石雞啼起龕把住也千峰失色放行也萬樹增光一念不生前後斷木馬嘶風入火場咄一咄云起秉炬趁早未即行只待雨淋首山中幸人多大家齊下手旋斫青柴帶葉柴燒得渾身都是口火風交吼萬峰中一道聲光空外走為龍雲懷賢耆宿秉炬舉炬云此能成物亦能壞物成則地水火風當處發生壞則生老病死隨處滅盡若是腳下無絲頂𩕳具眼底總不向這裏棲泊且如何是圓透一路攛炬云燎天熾燄休擬火撲地清香莫認風行腳垂示途中值風雨風飄飄雨灑灑道人行腳好生涯草鞋獰似白額虎拄杖活如赤斑蛇踏遍山水穿徹煙霞去來不借他人力覓心無處即為家聖水垂示雲居纔出不多遠心緒若干當下完惟剩一身無罣礙不安閒處也安閒入是三昧一任鬧市口展缽盂深山頭卓拄杖白雲裏吹鐵笛紅塵中遇知音布袋子灑灑落落阿呵呵不因今日事爭見昔年心佛誕日垂示㘞地一聲手忙腳亂曰天上天下惟吾獨尊雪山六載冰消瓦解曰一切眾生具有如來智慧德相有底道自語相違有底道理合如是據山僧判斷俱未抓著世尊癢處何為當年一段風流意入山雖有出山無留別垂示道人以無住為住住為非住東拂于逮休夏西瞿耶尼結冬南閻浮提垂手北鬱單越托缽拄杖子豎窮橫遍總未動著一步臨濟大師道有一人論劫在途中未離家舍有一人離家舍不在途中阿那個堪受人天供養師云行人飽坐人饑安城垂示雲月峰頭不肯住卻來城市裏安身山僧非是圖熱鬧十字街前覓個人既到寶坊爭肯空過拄杖子露頭露尾去也現前諸人切莫動著動著則千斤萬兩直下要人擔荷大眾莫有承當底麼穿衣喫飯人皆會那個男兒不丈夫鳳潭垂示拄杖子在天非天在人非人混身三界內一事也無獨露百草頭隨宜說法若以色見瞎卻汝眼若以聲聞聵卻汝耳苟能離聲離色不睹不聞內守幽閒猶為法塵分別影事諸人莫有過水不打濕腳底麼看看因齋垂示道人以三界為居萬法為侶一任拄杖子從四大部洲𨁝跳上三十三天猶未是他鄉異域家常飯應念托來福田衣隨緣遣去處處長安時時解脫何親疏榮辱之有雖然點石化為金玉易教人除卻是非難法雲誕日垂示山僧今歲滿五十判斷死生從此日閒家故具盡屬人惟留拄杖是我底當風敵雨傲雪凌霜隨分隨時自由自在雖然不得喚作拄杖子不得不喚作拄杖子喚作拄杖子則依他作解不喚作拄杖子則向外別求只饒會合將來一擊粉碎向淨裸裸赤灑灑莫可把處見去猶是戰功未謝坐地封侯要與從上佛祖酬恩報德未有分在況未到恁麼地動為聲色換卻耳目者乎諸人還知落處麼擲拄杖云即今休去便休去欲覓了時無了時居士設齋請開示師云開示佛法人人本具開示世法個個俱能教中謂是法平等無有高下雖則平等本具叵奈日用而不知知而不信信而不行苟行而無恒志悠悠忽忽向半明半暗裏𥳽弄精魂轉弄轉遠弄到三十日來終無個落處前路忙忙莫知所往嗟乎苦矣山僧自離雲居以遊化為行直指為心既到寶坊忍不與人說破臨濟大師道赤肉團上有一無位真人在面門出入未證據者看看看之時要迴光返看聞之時要迴光返聞若逐前塵所起知見水牯牛全身落草去也不見道若以色見我以音聲求我是人行邪道不能見如來居士肯向這裏見得徹信得及行得去敢道男兒不丈夫妻子聚首處祖師西來喫飯穿衣時諸佛出現家門即是法門世法不異佛法龐公道有男不婚有女不嫁大家團圞頭共說無生話龍雲中秋垂示秋風清秋月明山中受用不盡人間翫賞無窮行腳道人二俱不取不見道風頭來風頭打月頭來月頭打合頭來囫圇打總不與麼來乾淨打何為如此路逢劍客須呈劍不遇知音不與彈舉馬祖百丈海西堂藏南泉願同翫月次祖問正當恁麼時如何堂云正好修行丈云正好供養泉乃拂袖便行祖云經入藏禪歸海惟有普願獨超物外師云馬祖父子恁麼說話大似振玉鐸應金聲雖則殊玅奇特未免向光影裏湊泊山僧為諸人頌出無端指月問如何馬氏門中好事多供養修行拂袖去三千里外辨淆訛法雲制期垂示舉龐公道十方同聚會個個學無為此是選佛場心空及第歸選佛場今已開莫有心空及第底麼有則出來選佛去也如無且聽山僧隨方安頓東來底向西坐西來底向東坐南來底向北坐北來底向南坐四維上下來底團圞坐總不與麼來底中間坐諸人看看安也安得奇坐也坐得妙秖如無為法作麼生學過去心不可得現在心不可得未來心不可得咄若只恁麼道也是開眼做夢除歲垂示一年捱搭到今日今日方知是盡頭盡頭依舊無落處卻悔從前不即休若即休暑往寒來閒造化古今名相豈能留歲旦垂示一年十二月月月有初一今古未曾移聖凡不相識若相識群陰㓟盡一陽生九九還歸八十一像贊思意佛旋乎其髮皺乎其眉手攀其膝膝拄其鬚敷草而坐逐日而思眾生本自無度佛法意欲何施誰知出世丈夫也來賣弄憨癡水月觀音摘空中花撈水底月徒益狂勞應無所得何如念彼觀音力甕裏斷乎不走鱉處山大士觀音大士且聽我說如今盡大地人受苦罔竭刀兵疾疫饑荒屢歲纏綿不絕叫苦聲震若雷汝耳為何不熱我今當面白過莫再這裏閒歇魚籃觀音腳踏荷葉手提竹籃似魚非魚若賣不賣頻將此事作繇頭逢人教出生死外觀音大士入流忘所所是何物忘所入流流向何處根塵本自同源縛脫豈有兩路若悟識性虛妄奴也得成佛又聞不是根聲不是塵非幻成幻法自心取自心識得圓通無背向頭頭物物盡全真海舟觀音滔滔苦海一孤舟駕放風波浪裏遊兩岸中間俱不住度驢度馬度人牛布袋和尚這個憨布袋到處常相見不在山門裏便在佛殿外赤膊撩天嘻笑滿面當來補處大慈尊現住玅高兜率院達磨大師者位祖師尊嚴可觀東土罕見其人想從西域過來剛鬚鐵面赤膽水肝雄峰九載無人識隻履西歸天下傳又這胡僧真膽大一葦渡江焉不怕上時容易下時難只至如今成話杷又何水無魚何天無月直指單傳弄巧成拙雖然是主人若迷客得其便我不從伊學畫貓看你如何入虎穴十六羅漢渡海這十六個人畫底甚有神身上著五色腳底絕點塵乘獅坐象跨虎騎龍遊戲於無邊大海不住彼不住此不住中流安身於萬級洪波一任東一任西一任浮沉看這夥不顧性命底狂漢大似天臺山裏五百數中躲根阿師長眉羅漢齒缺生風眉長礙眼裸腹袒胸開心見膽雪嶠大師這老漢慣捏怪賣風流逞機見初於徑山見你閉門不納後於匡廬再參轟雷掣電一條拄杖太無情逢人盡教性命斷三十年來結生冤殃及兒孫沒了筭沒了筭漢語胡言聞皆讚嘆中興雲居諸緣和尚道行孤高因緣廣博從北而來隨方而托一入雲居全身放落轉寸土而為金化奴而成佛受苦受辛無言無說四十年來一向埋沒陳壇古廟冷香爐死之更死今發活春山是處杜鵑啼萬紫千紅如血潑傘居和尚賢首圓通不分皮骨狹路相逢以毒攻毒吾之性命喪師手中師之鼻孔落在我處將肯報肯以不酬不多年冷帳熱似還謂是物兮謂非物咄舊容顏休錯顧歷來千聖不能傳紙上無言真付囑又這阿師世所希少年窮快老莊癡人未到處汝能到汝所知底人莫知去寬從窄將高就低面面清風生杖錫團團明月照鬚眉只因深中臺山毒顛倒從來無藥醫又稽首我師傘居和尚心特慈悲性多倔強生怕風吹死喜水葬今由諸子不由師捧卻全身別供養萬仞峰頭地大堅一輪明月當空放騎牛像老老大大古古怪怪未還驢錢猶欠馬債白手騙頭牛騎看你好看不好看自贊自幼單板到老倔強孤硬一生諸緣掃蕩眼空兮天下獨行膽大兮佛祖不讓要識這漢姓氏名字陝府任二哥雲居方和尚又偉乎其形異乎其像修乎其鬚寬乎其量坐兮如山行兮若象不振而威不攝而望三十年來單提向上只饒佛祖不容情逢人盡教性命喪又關西子沒頭腦畫出伊不恰好縱恰好也是虛空生花草又七賢雲五老月亙古亙今光皎潔方融和尚本來面只可瞻仰春夏秋冬難以分辨青黃赤白歌雲居四季歌我愛春日居山逍遙方寸之間無縛無脫無忙閒或坐或行或站祖道義天朗耀風光心地花開若將知見強安排依舊漆桶不快我愛夏日居山置身火裏栽蓮牛車駕出任人看觸著焦頭爛面千丈雲開天目十方月皎松關失腳蹋殺佛如來別是一番境界我愛秋日居山聖凡名相俱捐布袋收放碧雲巖萬象森羅影現道悟機先言外心空馬腹驢胎孤光爍爍古今閒觸著轟雷掣電我愛冬日居山是中罷悟忘參寒梅晚翠月堂前目擊春魁獨占生死涅槃性淨菩提煩惱情乾饑來喫飯倦來眼所作從前皆辦四景歌我愛山居春景新條嫩葉差參千紅萬紫及時開僊鳥靈禽語怪明月遙呈清供香風謾把茶煎蒲團獨坐白雲巖果是為僧自在我愛山居夏景翠苔岩洞幽哉清風面面送香來一任開懷賞翫溪碧松花浪湧天空杲日光翻利名熱惱不相關果是為僧暢快我愛山居秋景暘輝碧落瑤階灣環卍字竹欄杆去就松奇石怪照案清池月朗遶籬紫菊花開出時閒耍入時看果是為僧散淡我愛山居冬景茆堂草榻虛玄梅花片片結成團懶起開門賞見林下清貧可貴世間榮辱俱捐巍巍默坐火無煙果是為僧事辦四威儀歌山中行水綠峰青如畫成我常拽杖碧溪邊閒看白雲似遠迎山中住隨處雲深權當屋橫來豎去一個人徹頭徹尾無蓋覆山中坐本無眾生誰成佛赤條條的一閒身更從何處安頭角山中臥一張床上無兩個日往月來晝夜忙鼻息如雷正睡著十二時歌夜半子打坐工夫暫且止兩腳長伸抱佛眠鼻息如雷穿被底枕邊事難盡舉睡醒方纔趺坐起佛夢法夢兩皆空面目從來只如此雞鳴丑百鳥林中亂開口鳳凰山上解翻身那怕群毛膽似斗丈夫漢無別有獨具一雙超方手蓋天蓋地沒遮欄豈肯隨人摸壁走平旦寅紅日熙熙到我門百年暗室一光破寤寐方知無二人泯爾我滅疏親纖毫顧慮則非真一念無生只這是佛法人情過隙塵日出卯家常茶飯無粗好一飽高吟百慮忘那有閒心惹煩惱今朝事明難保何若從頭一齊掃雖然不是大修行亦可討些小便饒食時辰鹽醬何曾挂口唇去歲喫餐油炒菜至今想起舌生津寧自苦懶求人借錢終不濟家貧但願明年緣分好粥飯禪和不離門禺中巳出家衲僧最伶俐打頭截斷老婆舌從茲不惹波羅密張家三李家四一任說來不動氣非是生成心量寬學得自然無師智日正午是誰錯打三更鼓只圖戲弄耍孩兒不顧老誠人作主日可父月可母黑白誰能分清楚最先一著更難明鹽價從來無定估時㫙未青天白日著鬼魅十字街前占卦靈說我今年多好睡義不通禪二會開口便把人得罪只因當面不容情過後惹得人指背晡時申目前物色自來貧和雲置得封口衲家常無復問寒溫放一件穿一身幾番過夏又經春多年要作單板漢難道今時又望人日落酉明眼人前謾開口荒村破店水云深野鬼閒神難措手衲衣下何所有到家自會知分剖趁起泥牛海底眠聲聲盡作獅子吼黃昏戌燈盞無油黑似漆雲開天上月孤圓一線清光穿屋壁曲木床簑草席老鼠做家聲唧唧一心只想死貓頭誰知省事返多事人定亥從朝至暮事已辦今宵脫腳且安眠明早起頭再打筭過去心未來念現在誰續復誰斷百年三萬六千日返覆無非是這漢插禾示眾雲滿青山月滿溪歌聲浩浩插禾時即此薦莫狐疑雲農口裏絕浮詞泥水田中親下手淺深冷煖自然知身心放下無多事一莖拈起有來由泥沒脛雨淋頭縱橫簑笠在春疇除卻種田博飯喫更無佛法可傳流佛祖傳來真切意良疇一味植靈苗須努力莫辭勞一年一度甚難遭全身放在此田裏那怕泥深水面高雲居佛法異諸方博飯耕田歲日長忘苦樂任閒忙水泥深處建禪堂露地白牛生拽轉逼得犁頭鐵放光入廛四儀我嘗城市經行隨時任運騰騰無論晴雨不拘風要動乘興便動畫閣雕樓物色花街柳巷歌聲見聞出入甚分明一點不落凡聖我嘗城市建立處處銀山鐵壁本無古往及今來有甚安居解制大方家非彼此長安路絕蹤跡行腳寸步未曾移歷盡十方三世我嘗城市打坐放下蒲團一箇脊梁豎起事無多聖解凡情盡破究竟空非有外歸源水外無波一毛頭上立山河有甚階級可墮我嘗城市鼾眠兩丸晝夜循環紅輪瞬息上三竿尚未翻身轉面枕邊嘗作佛事夢中永絕攀緣任從車馬到來參也著別時相見偈贈蒲菴大師事親既已辭親又事親是中端的有元因兩條檐子一肩荷要作世間出世人送其天大師住壽昌破暑登舟為祖庭風帆未挂浪先生如龍拄杖入山去震動乾坤大好聲懷天童密和尚昔日曾參金粟寺入門水火不相投偶臨白棒撾毒鼓觸著生前徹底休問處幽深荅處高棒頭有眼已曾遭此心莫道無蹤跡直至如今恨未消參無念和尚孤笻萬里向南方只道參禪別有長黃檗峰頭逢念老頻將打罵作商量參雪嶠大師海上歸來入徑山語風深處扣僧關相逢不許人多話惟道參禪不等閒付檀園林維那江邊不駕打魚舟深入洪波下直鉤釣得一鱗頭尾正聯芳千古足風流贈洞山續公遍參楖栗橫肩無住身萬峰直入欲誰親明知佛法無多子要向諸方問過人贈惟六座主面面銀墻面面門真人出入獨稱尊放光雖不離身宅迥脫三心與六根送達公禪師出山數載清涼仰道風孤高不被世牢籠如今拄杖出山去莫落人家虀甕中付遺聞德監寺恩怨門深不易遭自從無始至今朝相逢狹處難迴避徹底掀翻沒一毫示圓明淨侍者禪人相伴我居山一日曾無半刻閒不是搬柴便運水更令托缽到人間示一知客本山果子本林茶果熟茶新味可嘉托出滿盤隨客用清香切莫自先誇示刻慕老宿年老為僧事未遲朝聞此道夕無疑既將身入空門裏喫飯穿衣更是誰示本悟禪人佛在己躬莫外求行同道路渡同舟他山此水雲兼月處處蹋穿始徹頭示憩巖密維那住山一句投機百計休惟將此事遯林丘草衣木食深藏蓄水到渠成始出頭示明宗禪人未久居山又出山草鞋踏破路頭寬既為出世奇男子豈把光陰過等閒示見初發監收血書法華經刺血書經事最真單提一念頓忘身法輪轉處龜毛赤流布十方絕點塵示定之禪人工夫做到契緊處心境起時當下完若作從前如是見得驢容易脫驢難示不思禪人禪人乍學做工夫且看趙州狗子無但有言傳非是意一聲爆地自相如留別劉調元居士浩浩乾坤遊戲場那分此界與他方和光混俗隨緣去焰熱水寒總不妨示休心靜主遍參道在家山莫外求全身放下便無憂若將玄玅心頭挂參到驢年未即休示源侍者分明此事莫多疑喚去呼來亦大奇不信但從日用看迴頭轉腦是阿誰示可靜主毫釐錯念隔天涯辨的除非是作家莫道靈雲獨具眼春來誰不見桃花示懶緣靜主飯來便喫茶來飲飽後經行倦打眠除此別無一件事寒溫幾度不知年留別馬巷眾居士拈來大地一禪堂坐臥經行任抑揚識得目前無礙境何分東土與西方示本禪人參父母未生前面目父母未生誰是我已生之後我為誰兩關透過知如此高坐禪床罵祖師示雲上禪人乍得身心一念間更須努力莫停參若從此處端然坐無事深坑出大難示守真禪士學人參學莫虛勞壁立千峰著眼高知識門庭如火宅擬心湊泊被先燒示無入燈公參禪縱得入頭處更向孤峰徹底寒不具一番堅固志荷擔此段事應難示自立行者參學記取當年下髮時病軀難以教癡兒於今打發諸方去學得成人不可知示葉居士祝髮看破名高與利高千金難買剃頭刀若從刀下明斯旨無始輪迴一念消示瑞卿葉居士五老峰高遠望尊難將寄語問寒溫自須親到一回後別有風光照面門示澹然饒居士澹然無事是家常靜裏工夫莫暫忘若執清閒為所得百年光景一朝霜行實自紀予籍陝西西安府涇陽縣任姓子生於明萬曆三十年壬寅七月七日子時年五歲識世間善惡事每見僕輩烹割則避走見僧入門則喜笑或與父語話必拱立敬聽不好共群童戲愛靜坐非母喚則不動一日予兄特具雞黍強命予食不覺怦然有動力請母止之由是隨母素食見母禮佛亦隨禮見母誦經或跪於前或立於側母口授心經須臾成誦不忘年十歲有姻家欲為謀婚定者父謝之曰此兒當為佛家弟子非塵俗可羈人或徵其意父曰吾邑有寺曰赫塔主事僧名海福持身頗嚴見人則笑人以笑和尚稱之素與吾為齋會友年七旬餘染寒疾吾日往看訊福曰老僧不久離此居士可施我安身處否吾曰寒家山地頗多任師所擇即用供養福合掌謝布施次夜吾內夢福入房忽醒以告吾驚異往視福已亡矣既而吾內有身茹葷則嘔吐遂發心長素供觀音大士像習金剛般若持誦無間吾時心占前夢知福所為非山地矣及娩得男有族祖封君年九旬餘至吾家問兒生日時詳其語乃安名福生年二歲見僧則笑三歲見佛像則合掌五歲兄與腥食則不懌今十歲雖姑嫂姊妹之房輒未嘗過如成人儻此兒善根夙植故當成就之恐墮落世緣或有他患父往往告人如此故予出家之志彌決也年十二父喪兄欲為予議婚母不許曰汝父存日作何言而汝欲違之邪況我亦有捨子之念但未得好師耳自此兄弟姊妹皆以僧相看特加恭待年十六辭母隨族叔謁五臺母曰我聞臺山有萬尊肉身菩薩常住處汝去必得好師勉之勉之遂贈飾金為供儀次晨拜行親族男女兄弟姊妹無不悲淚惟母不欲以離別之色傷予宿志更歡喜見送夏初到山見其林巒聳秀溪徑幽邃舉足皆寺啟眼是僧問叔曰母謂此山是肉身菩薩所住處何者即是叔曰龍蛇混雜聖凡難辨又曰我為出家當依何人叔曰隨子之緣經兩月五臺高頂諸大名剎無不遍遊一日過寶林隨喜主者一見如故交款留連日入續燈堂見大材和尚叔禮拜予亦隨拜師曰向夢老者攜童子求披剃今其拜者大似前夢所見叔告之情師即肯許以七月七日設齋集眾親為剃落受沙彌十戒法名如璽是為萬曆四十五年丁巳歲也自是每歲奉命往還京師聽講靡間年十九師壽九旬有二一日忽示疾絕飲食三日予跪請曰璽早年喪父辭母出家雖蒙師慈悲剃度心地未明師若不起璽當作何事即得不負為僧之志師曰堅持淨戒為本聽學大乘經律開發慧性若有向上根器當依善知識參禪去須知老僧曾見瑞峰來予曰沙彌十戒已蒙師授教典雖未精通然略已講究但未知甚麼是禪師瞪目一喝而逝椅坐三日龕供七日顏貌如生封龕日有彩雲籠寺諸山耆宿晝夜接踵者半月餘茶毘日煙氣異香開壙造塔禮謝諸山一載方訖年二十歸鄉看母母已有疾日夜侍其左右母曰我持齋多載病在呼吸子既為僧若能為母下髮是為至孝予迺奉命啟佛為母剃落朗誦三皈十戒母聞而歡喜索鏡自照曰素猒女身今現僧像我願足矣斂鏡端坐念佛而逝侍柩三月日誦金剛般若安厝方畢是歲秋即結友謁峨嵋聞放光臺有活普賢直詣參見纔禮拜師曰普賢普賢予曰何得如是虛妄授記師曰老僧何敢輕汝是夜茶次問曰何省人予曰陝西師曰離鄉來此端為何事予曰謁名山師曰山以何名予曰普賢道場師曰道場已入還見普賢麼予曰名不虛傳師曰你去南方參得禪予曰此間還有禪也無師震聲一喝予於是領略其旨密契先師一喝之意年二十一謁千佛寶頂秋入楚之荊黃時漢陽水荒百姓避走者如蟻聞鄖襄頗熟而反棹冬謁武當度歲年二十二仍轉襄州聞黃檗山無念和尚道風大振門庭峻異凡見人來以打罵為佛事徑往參見纔入門師喚廚司云有飯盛些來與這閒神野鬼喫了去予曰早知和尚有此扁額師曰油嘴花子叫執事快與我扠出去予曰將頭不猛累及兵丁師拈拄杖便趁打予急走曰拄杖子請和尚自領去執事曰莫多嘴予曰早恁麼道免勞和尚尊力挂搭三月一日辭行師曰再住住予曰來時遣即不去去時留即不住師拈拄杖歸方丈予便戴笠而出秋到博山參見罷安單雜務寮冬入禪堂結制開發生從何來死從何去話予曰生死緣起且不問未審是甚麼物恁麼來去師曰正好疑著力參一季未有入處每入室請益不契逼拶成病移單印定寮調養忽聞同寮僧讀楞嚴經云因緣和合虛妄有生因緣別離虛妄名滅殊不能知生滅去來本如來藏常住妙明不動周圓妙真如性性真常中求於去來迷悟生死了無所得如藥病相投舉體輕快遂入室呈偈請益偈曰生從何來死從何去但有言說都無實義師曰未嘗無實義只汝不會予曰某甲從來無虛語師曰未在由是疑情更發以至竟夜不寐終朝無語雖同眾作務如無一人相似不知者竊以古頭巾漢譏笑之予或聞亦不知也一日隨眾出坡挑米因途中擔折如夢忽醒心目洞徹歸詣方丈請益師止靜簾外作禮而退年二十四春過匡山訪一菴慧燈法幢諸尊宿輩夏到金粟參密雲和尚一見便問臨濟大師道有一人論劫在途中未離家舍有一人離家舍不在途中意旨如何師打曰一棒齊打殺予曰此是殺人棒如何是活人棒師又打曰還知痛癢麼予曰殺活分明今且置全提正令當復何如師又打予曰元來金粟佛法無多般師曰你作麼生會予一喝便出秋過南海冬轉徑山復往雲棲度歲次春入天台國清訪寒山拾得遺跡復參湛然和尚聽講數日凡浙地名山巨剎隱顯高賢靡不遍參請益也年二十七夏復入徑山參雪嶠大師纔見便曰我這裏沒飯與你喫到常住去予曰已蒙常住挂單茶飯俱足敬來求師太名筆師云帶得紙來麼予曰恐不中尊意師曰拿來看予展兩手師云也將就予便撫掌而出秋到金陵冬入講席次春隨喜諸大名剎遍訪京師年二十九謁九華從江西欲往曹溪道經西昌值子房曾公留掩關三載詳覽教典年三十二受虔州坦公請講楞嚴於蓮社禪林夏講孝衡疏鈔明年復赴前請重講經鈔又明年受蘇溪冠山請講孝衡彌陀等鈔年三十五丙子春乃值先老人顓愚和尚自螺川過五雲首龍郭公及眾信迎師至蘇溪休夏於百桂書園時予主香象期敬詣參見作禮問如何是諸佛戒師曰公去問善知識予曰和尚何得過謙師曰病僧行腳日久予曰也要在此為此師笑曰公且坐喫茶遂將求戒顛末詳細告師師應諾於五月二十五日增沙彌戒六月初一日進比丘戒初六日圓菩薩戒三壇具足感慨希逢更益精嚴遂發結茅孤峰之願丁丑春師往匡廬埽憨大師塔秋入雲居予聞即詣親覲師時受給諫熊青嶼公與味白師請興復雲居命予職監院事每見師教人參觀音大士即今在甚麼處話一日解制大雪連降師命眾作頌尤諄諭予作復垂問勘之予頌曰多言人怪寡言癡語默何嘗不是伊若問觀音真住處梅花幾點洩天機師云洩甚麼天機予曰瑞雪報年豐師曰再頌又曰識得這些便休歇甕裏斷乎不走鱉問今何處是觀音梨花偏打元宵節師云你喚甚麼是甕裏鱉予一喝師曰此皆住山得的予曰元來不欠少師曰你真鬼怪予曰某甲見和尚如古佛師默然予纔出方丈師又呼入云觀音大士即今在甚麼處予曰家家門前雪滿堆師曰雪消後如何予曰水到渠成師曰不辜負你喫清粥淡菜予即掩耳而出時庚辰孟春望日年三十九歲矣辛巳春謝監院事欲結靜廬於山之後屢懇師固不諾秋迺有南嶽之行欲畢結茅之願途中師復遣人趕回癸未秋七月十一日師榜示大眾安第一座予入方丈堅辭師曰此是閒執事八月初三日師出山往邵陽初十日合院大眾請理常住事辭之十八日護法熊季納居士復入山設齋同眾固請十月初七日師自吉安遣人齎書至山命眾奉予代理院事堅辭不獲十五日結制復請落堂有法語臘月八日秉命傳戒有榜式并具別錄是冬師阻兵寇不達遂返棹抵金陵甲申春予走金陵迎師還山而師建紫竹林乙酉再迎又以林事未訖期以明春丙戌因諸山多事予未遂前約迺招法璽大師齎書往迎師已登舟疾作諸弟子強舁歸林以五月六日趺坐而逝二十九日訃到雲居予即買舟往迎師龕歸塔而林中留龕供養相待久之請天界先老和尚處分以明秋為歸龕之定期予於時負病還山蒙熊氏一門暨合邑紳衿居士諸山耆宿公請予繼雲居之虛席辭再三不已仍以代理就事俟師龕歸塔然後赴諸公命丁亥夏躬往迎龕值師初忌眾請天界和尚上堂予問青青翠竹盡是真如鬱鬱黃花無非佛性只如竹未生花未發真性何在師云當今突出別手眼看取威音那畔機予曰當今眼即不問如何是那畔機師良久云會麼予曰深密幽玄蒙師直示向上一路千聖不傳意旨如何師云這段風光天然自在予曰恁麼則彌輝普耀去也師擊如意予便歸位一日碧峰寺見師師問何處來予曰林中來師曰林中事動止如何予曰特來請問和尚師云提起放下一任繇你予曰也要和尚證明師云杖人從來不輕許人予曰設許人時如何師良久默然予便禮拜師亦默然午後入室禮拜師云作甚麼予曰歸林去師云適從那裏來予曰隨喜羅漢來師云羅漢都在麼予曰若不在將甚麼見和尚師云杖人無面目你向何處著眼予曰轉見親切師云如何是你親切處予便禮拜而出林中事畢過天界辭謝師云向日彌普底今朝試道看予曰總在這裏面辭去師云水遠山高切須仔細予曰自有拄杖通霄徹淵便出師送偈扇如意等具力勉受之冬初抵雲居時山田遭蝗所須百不給拮据逾年以己丑仲冬廿一日之吉窣堵甫成院舍香燈略具所不能莊嚴如意者以待將來同門諸兄之緣力耳事竣予告護法檀越及在座諸師面請法大師繼主先和尚之席法已慨諾季冬廿四日予將常住冊籍什物付執事看管以俟奉法入院而予將退居塔院侍香燈法迺約期去匡山而不時至而予延佇竟載坐違夙願紆懷成病辛卯春遂出山托缽行腳夏至匡廬卜隱未就秋挂錫五乳冬為諸子說戒時年滿五十矣壬辰春本山耆宿見契始泊於五老峰之瑞雲崖狷穴同居野蔬度日而又有千尋之嶂結秀層雲萬頃之湖俯瞰無際凡予二十年間積懷未遂者至此而可以無憾矣予自辛卯辭雲居事退隱匡廬春秋九易承先師浪老和尚屢書勉其應世皆以老病不出山之願謝之己亥五月朔二日師差風峻機持書到山有衣偈源流囑予予即焚香啟讀竟對使舉示左右云遯跡匡廬數載一切是非不管縱有口舌撩天到此冰消瓦解即今三世諸佛衣法歷代祖師源流我本無心希求彼卻有意自至且道受即是不受即是乃擲書於案頭云老賊分贓獲者殃及九月朔七日見日公送訃音到山次日設位上供拈香云璽於數年前跨木馬遊火宅眼冷心灰數年後向孤峰結茅屋大休大歇已謂此生事畢豈知禍身難掩欲隱彌露往業難逃欲避偏遭只得重抖精神復整威儀拈一瓣香穿渠鼻孔說幾句話通渠耳竅雖然賊過張弓要且箭箭中的呀將昔冤報昔冤以今屈酬今屈莫道對頭不相識十一月朔二日出山臘月朔二日抵天界初八日對龕上供告香云千里聞風一月來遙知此事已安排全身坐在炭坑裏向外覓求焉在哉庚子四月十三日送師龕入攝山建塔八月十九日於紫竹林受侍御陳旻昭居士憲副劉純之居士暨合郡縉紳孝廉文學居士同諸山耆宿本寺方丈監院等請住天界於九月十五日入院辛丑春結制皆有法語載錄夏建普福道場七晝夜時予年滿六十矣是夜茶次因眾問予有生以來行實不覺忉怛至是侍僧次日請錄遂援筆紀其大略如此和中峰禪師懷淨土詩廬山瑞雲沙門大璽著一乘願力入娑婆忘失西方劫數多今日迴心須念佛去來由自不由他故鄉非外路非賒纔想歸家便到家眼裏西方心內佛迴光返照本無遮欲往西方須念佛六時晝夜莫停聲情塵念到消忘處淨土何愁不得生國名極樂誰為主秪有彌陀一世尊垂手娑婆無量劫教人同入念佛門信行弘深願往生西方三聖總持名慈悲不捨哀攝授我命臨終共接迎念句彌陀問是誰問來問去起深疑渠元就是唯心佛要與當人自證知彌陀釋氏共胞胎兩土平分任取裁識得自心無不是此誰生去彼何來此去西方多少路迢迢十萬億途程耑持自性彌陀佛淨土惟心絕點塵諸佛本無彼此相眾生與佛自疏親蓮花世界何多佛盡是娑婆過去人死死生生生死死塵塵剎剎剎塵塵自從一念彌陀佛頓脫輪迴無始因獃不獃兮癡不癡無心念佛似嬰兒全身本是光明藏悟後還同未悟時淨土娑婆共一家教人生去本無差若將彼此心求佛捨卻阿娘認著爺苦海無邊欲出離只須日夜念阿彌一聲相應狂心歇便是舟登彼岸時即心是佛將心念念到心空佛亦忘親證一回方解道涅槃生死總無妨佛祖同宣淨與禪隨機方便利人天箇中消息無分別直指歸真達本淵佛說彌陀一卷經全彰依正數難明自須親睹慈尊面始信剎塵是化城淨土云何名極樂因無惡道苦相侵珍衣寶饌隨心至樓閣園林地布金樓閣層層寶所成門窗咸放大光明黃金座上彌陀佛說法時時度眾生七重行樹葉婆娑四道金欄界網羅晝夜經行花滿地香風微動念彌陀九品蓮花共一池含輝發耀映時時常為不退菩薩母產育娑婆念佛兒珠網玲瓏寶樹森微風吹動妙多音譬如天樂同時奏聞者皆生念佛心八德池中九品花或開或合大如車青黃赤白光交燦底布金沙長佛芽地布純金平似掌六時不斷雨天花眾生清旦盛衣裓供養他方佛老爺鸚鵡頻伽遶樹林梵聲和雅悅人心休疑異類同居此盡是彌陀變化音彌陀一念一蓮華因徹珍池果不差念到功成佛接引一聲彈指便歸家一心不亂是專持名號聲聲莫暫離打破疑團即是佛不須重覓古阿彌萬德洪名無量光十方普照貌堂堂自從無始至今日劫數何如壽數長洪名一舉萬緣灰獨露娘生面本來非色非空非背向更從何處惹塵埃欲尋捷徑歸家去惟有參禪念佛門除斯別求方便路更無超過此為尊參禪不外唯心土念佛何殊直指禪禪淨同源入處異任伊先上那邊船彌陀即性性唯心生與無生絕點塵內外不居中不住露堂堂地一閒身成就黃金丈六身圓光普照日惟新人天聞見生希慕同種當來出世因六方諸佛讚西方彌覆三千舌廣長異口同宣唯極樂更無別處可商量遙憶西方西復西極西之處更難思但將妄想心消滅即是歸家見佛時十六觀門門廣大四十八願願洪深知先發願生彼國守約尋門歸自心萬慮咸休坐草堂一心不亂想西方有時忽入那伽定親睹彌陀無量光願見西方佛世尊時時送想日頭昏彌陀知我歸心切返放毫光灌頂門不立一塵修淨土還空萬象念彌陀纖毫著意尚非是何況心中妄想多一盞清燈一炷煙光明常照於龕前殷勤念禮彌陀佛徹骨冰寒尚未眠自性彌陀莫外尋外尋空費草鞋金迴光返照能尋底不出當人一點心腳踏今世門頭地頂放威音那畔光究竟此心元洞徹七通八達有何妨事窮理極獨惟心妄想浮塵不敢侵識得此心無寸土拈來瓦礫盡黃金眉毛豎起眼橫睜念一聲兮問一聲千聖至斯無覓處箇中誰敢強安名威音那畔絕消息今世門中覓亦無妙有真空常湛寂彌陀即是古毘盧六根六識六塵情內外中分界處生無位真人都不住頭頭法法放光明視也無形呼有聲有無呼視甚分明及乎尋箇分明旨卻被空花翳眼睛案頭常秉般若炬爐內頻燃解脫香一句了然超百億寂光三昧遍十方往生捷徑在人心切莫徒勞向外尋辦自肯心念自佛本無差別路頭侵萬象之中獨露身遠無疏闊近無親現今若要知端的但向塵中作主人六根都攝念彌陀淨土唯嫌揀擇多深入一門一切入百千方便盡包羅六根恰似劫財賊六識猶如引盜郎縱有心王無用處彌陀一舉盡投降我與彌陀夙有緣彌陀為我用心堅嬰兒憶母情親切母念嬰兒最可憐念佛念到最親切寒暑飢虛總不知只待因緣時節至彌陀一見更無疑佛法本無權與實眾生根器有聰愚彌陀化主心平等同指西方一路途彌陀為甚皺雙眉堪嘆人生大似癡面赤髮烏不念佛齒黃頭白悔應遲萬行莊嚴清淨土圓滿福慧紫金身眾生非是全無分只要居塵不染塵三界無安如火宅四生輪轉認為家彌陀苦口與人說勸往西方九品花信力堅強行願真往生因果不虛陳若能念念心無退即是蓮花國裏人無量劫來生死業彌陀一念盡蠲除命終還仗洪名力上品蓮臺定可圖八萬四千入道路箇中捷近是何門十方三世佛同贊淨土彌陀第一尊清旦鐘聲法喜時盈堂僧眾念阿彌缽盂應量一般飽但往西方有速遲年來想念佛心堅聖境時時現目前昨夜繩床一夢覺全身猶在寶池蓮一心不亂那伽定名號專持般若禪寂照圓融真淨土十方世界亦如然晝夜彌陀十萬聲也無欠少也無零是中有箇難瞞底字句分明計得清彌陀佛是我親爺棄捨伶俜去路賒三十餘年空眷戀至今發念要歸家自家屋裏彌陀佛日夜何嘗須臾離若去將心向外覓世人豈不太愚癡喝棒如雷氣似王問渠著甚急顛狂自心不把彌陀念只恐臨終手腳忙佛是眾生慈父母叮嚀苦勸早歸家莫教兩鬢生霜雪擬欲還時路恐差勸念彌陀不得閒將心日用苦攀緣滿堂金玉雖為貴難保人生有百年功名蓋世日無多覷破猶同水上波話到無常空嘆息何如趁早念彌陀人生富貴植前因布施齋僧發意真若肯今生思念佛當來又是果中人貧窮念佛正相當跣足提巾上藕航若問歸帆何太急因無財寶挂心腸既作人間大丈夫莫將財色把身誅阿彌陀佛隨心念托質蓮胎應不無女流念佛信繁難忙裏偷閒要數完若想臨終生淨土莫愁家富與家寒鉗鎚拈起響叮噹打鐵爐中選佛場久煉純鋼成一片功成時至往西方鸚鵡舌巧被人籠念佛無心卻有功脫下皮毛生淨土靈明托化藕花中十善咸明感上天不持名號總徒然縱能修到非非想難比西方下品蓮人人盡道念彌陀借問彌陀是甚麼眼似銅鈴心似漆口吧吧地只圖多娑婆五濁未能清耑念彌陀願往生感應道交佛接引剎那間悉頓圓成庶鳥珍禽同念佛茅堂寶閣共為家若將清濁分優劣平等光中見自差百千方便皆權說唯有念佛一事真但看古今賢與聖阿誰不把此門陳因該果海膠中漆果徹因源錦上花流水光中知念佛夕陽影裏解歸家廣陳依正從今日備載修行利後人舉約該餘成捷徑去繁崇簡早歸真想相為塵垢是情出塵雖淨垢還生要將漆器掀翻底但念彌陀六字名應無所住安心竟心若有生所住非降伏其心唯念佛西方淨土是真歸一身四大為墻壁五蘊三毒當作家圓洞六根皆戶牖心佛出入總無遮芭蕉好似世人心剝盡方知惜寸陰若肯從前思念佛且無霜雪把頭侵千林花鳥音和雅萬壑松濤聲韻佳無限風光無限意念佛念法念僧伽魔強法弱路千差一念無為似斬麻坐斷兩頭生淨土念佛還仗佛冥加自心有病自心醫病差醫忘心亦離若問此方真妙訣阿彌陀佛是吾師蓮池海會佛如來勢至觀音坐寶臺垂手娑婆同接引眾生箇箇離塵埃想見西方九品蓮至誠歸命禮金仙道交感應忘能所心地花開現佛前蜂房蟻穴光明藏柳巷花街功德林法界等觀皆淨土原來無處不惟心說是說非人不解譚玄談妙有誰知依稀彷彿難分辨一舉彌陀盡決疑既念彌陀願往生休疑心地理難明觀音勢至為朋友佛道何愁不速成萬樹春風入院溫寒涼消盡熱心存花香水暖蓮臺淨直往西方面世尊夏日炎炎似火流陽光燒白世人頭彌陀常住清涼國接引眾生向彼遊一念彌陀萬事休長空雁過語悲秋歸心恰似離弦箭端向西峰看日頭冬至風寒雨雪飛飄零稚子欲誰依婆心切切倚門望臘盡年窮不見歸四時八節如旋火萬死千生若轉輪只有此心無動靜耑持名號日惟新西方風景最清涼心地無塵熱惱忘諸上善人同會處經行坐臥悉安詳即是即非還更遠離名離相處猶疑多方善誘都難信親見歸來始得知茶煙消盡五更初除想西方一事無鐘鼓聲傳空劫外一門深入法王都勿論冤兮勿論親逢人一味語頻頻口空非是說空話勸念彌陀果是真自從親入遠公社善友難逢是箇中不遇中峰懷淨土青山逾遠雲彌豐最上參禪惟念佛祖師公案漫疑猜不須待悟拈花旨且仗彌陀歸去來或曰西方或謂禪聖凡沙界總同圓舌頭非是無觔骨遍覆三千出自然詩成百八口親宣雖讚西方不礙禪識得自心無定法但隨機便利人天菩薩戒弟子劉興孝捐資敬刊
