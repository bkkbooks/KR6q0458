一輪衆生無數惟佛獨尊在天而有天尊佛乃天尊之尊在人而有人尊佛乃人尊之尊在聖而有聖尊佛乃聖尊之尊若在山僧無有高下何為如此這裏本無凡聖見有何道理落商量上堂今日上堂傾盆雨雪冷落門庭無法可說縮項長噓憶古人滿床盡灑梅花屑解制上堂一事圓成百日期放開布袋任東西果然得箇出身路不負從前挂劍眉所以道未有常行而不住未有常住而不行秪如行住分明合作麼生安置孟春猶寒恭惟諸人珍重上堂脫去住山破衲襖卻來應世著金襴添新換舊意非別盡是當年業使然目今拄杖拂子搖頭擺尾似鳳如龍獰俊海天縱橫無礙復是何感報普請諸人看看住金陵弘濟禪寺語録康熙壬寅九月十八日師於天界受紳襟文學居士諸山耆宿等請住弘濟寺於十月初三日入院佛殿一尊古佛殿三間半在江邊半在山今被老僧齊坐卻弘揚自有衆多般雖然如是也須大展三拜據室衲僧家風無定行事一任牛欄馬廄虎穴龍宮拄杖到處自我作主況集衆叢林選佛場地諸人還會麼若未禮拜了退上堂拈香祝聖畢復拈香云此一瓣香天界曾燒弘濟復熱總為先師浪老和尚用酬法乳之恩乃斂衣就座上首白椎竟師良久顧左右云會麼昨出善世法門今入弘濟禪寺一條拄杖隨身兩處逢場作戲不見道彌勒真彌勒分身千百億處處示時人時人皆不識即今釋迦過去彌勒未來正令全提當軒者誰驀拈拄杖云莫是這箇麼雖然法不孤起緣會方興茲承闔郡檀越諸山耆宿恭請山僧隱靜於是禪道佛法一事不為但飢來喫飯倦到打眠諸人於此作麼生會昔趙州住院凡見僧來便教喫茶去當年此老雖然意出常情言無揀擇未免將這些子向飲食裏輕舉賤用山僧則不然真金自有真金價終不和沙賣與人結椎下座當晚示衆大抵此事說到莫若行到行到底人自然會說古謂但知心是佛何愁佛不解語又云行解相應方堪出世為人若只徒說而不行但能利人不能利己若只默行而不說但能利己不能利人直饒說得行得來弘濟門下正好喫棒且道山僧與諸人恁麼道還是行耶是說耶具眼底試道看結制上堂舉長沙上堂云我若一向舉揚宗乘法堂前草深一丈如今諸方禪和子大都愛熱鬧嫌冷淡忍耐不住混入野狐精隊莫能返省猶謂理之應為闡揚大法殊不知屈辱從上宗風也所以古尊宿教人意在真參實悟不在知解言論實悟底人得意忘言於逆順境上作得主宰生死關頭得其自由不見裴相國問黃檗山中四五百人幾箇得和尚底法檗云道在心悟豈在言說言說秪是化童蒙耳道畢竟作麼生悟莫將閒學解埋沒祖師心冬至上堂冬至短夏至長春分暖秋分涼四時運物如轉輪八節催人似箭忙秪有山僧拄杖子不屬造化與陰陽飢餐渴飲傲雪凌霜一段真風空劫外不離日用與尋常七月十五日上堂今朝是中元嘉會自恣良辰諸佛歡喜衆聖雲集隨所住處隨機羯磨有過底悔過過悔而功著無過底加功功加而果證當知是日十方世界一切人天有作空花佛事水月道場底能除一切苦能獲一切福真實不虛弘濟家風則又不然月月是好月日日是好日不見龐公道十方同聚會箇箇學無為此是選佛場心空及第歸雖然如是口說無憑驀豎拂子云看看喚作拂子即是過不喚作拂子亦非功畢竟作麼生得二俱不墮去速道速道衆皆默然師云果然沒孔錘錐劄不入擲拂子下座上堂鼓白浪於萬仞峰頭揚紅塵於千尋井底三百六十骨節節節盡皆建立八萬四千毛孔孔孔廣為流通耳聰底聞眼明底見聲色歷然無剎不現鐵𪢬圇地解脫門八字打開成一片上堂江上潮聲澎湃窗前樹影婆娑文殊吟風嘯月普賢逐浪隨波善才童子善知衆藝圓通大士自在圓通較量四聖所作未免各具一能且道山僧境界當復如何驀拈拂子云隨流識得性無喜亦無憂毗盧佛裝金上堂師云毗盧遮那佛法界主中主隨類現全身自我而作祖今朝弘濟拂子向無見頂上坐斷三身於有情腳下廣行萬行雖然是法平等未免猶有高低秪如盤旋珠走意轉機隨物我交參事理互顯出真入俗帶水拖泥不避譏嫌何妨混跡花街柳巷酒店屠房虎穴龍宮神壇鬼廟東扯西拽上舉下提折攝雙行慈威並用或是或非人不識逆行順行天莫測且道拂子具甚麼眼受陝西寧夏鎮衆護法請上堂離鄉四十五經秋返目流光一日完踏遍諸方今世界還歸大國古長安雖然如是不因罷戰馬難到太平鄉茲承衆護法各發誠心共辦信具和盤托出恭請山僧且道受即是不受即是弘濟堂前親切意長安路上廣流傳小參小參師豎拂子僧問和尚升座大衆瞻依拂子未舉時如何師云寰中天子敕進云已舉時如何師云塞外將軍令進云已舉未舉時如何師云疑煞天下人僧禮拜師云險乃云古人道有物先天地無形本寂寥能為萬象主不逐四時凋向這裏會得則知未有三才二儀先有本命元辰主持造化産育蒼生凡處同分世界底莫不均稟這段虛玄靈妙之真光經寒暑而不變歷今古而常存智者知是佛性迷者喚作精魂試看日用分明是佛性是精魂還辨得也未昔瑞巖喚主人公惺惺著今後莫被人瞞良有以焉諸方盡道瑞巖喚主人山僧卻道主人喚瑞巖出乎爾返乎爾用常妙體常虛體虛則非凡非聖非悟非迷非生非滅寂寂焉呼之而內則不能無其聲用妙則忽前忽後忽左忽右忽上忽下昭昭焉視之而外則不能有其形到這裏無你推托處無你承當處良久召衆云主人公惺惺著今後莫被人瞞好解夏小參夏末秋初解制期崢嶸頭角繞丹墀盈腔意氣沖牛斗無敢當機捋虎鬚莫是知法者可懼麼莫是自得者不輕泄麼莫是默契者便休去麼如不然便是背寫千張易對人一字難復舉世尊在靈山會上拈花示衆惟迦葉破顏微笑遂將金襴伽黎正法眼藏付囑流布毋令斷絶後來阿難問迦葉世尊付金襴外別傳甚麼迦葉喚阿難難應諾迦葉曰倒卻門前剎竿著乃紹二祖位自此西天四七東土二三直至如今且道還有優劣也無苦瓠連根苦甜瓜徹蒂甜立秋小參一花發大地春一葉落天下秋得少以為足見角類金牛且如花未發葉未落知是甚麼時節直饒擬向大熱大寒處去猶被寒熱時所使未必能使寒熱時不見昔僧問趙州十二時中如何用心州云汝被十二時辰使老僧使得十二時這箇道理甚是分明秪今會得識心達本源故號為沙門非但不被此箇時辰使亦復使得此箇時非但使得此箇時亦復同上古人使得十二時非但使得十二時亦復使得三十日非但使得三十日亦復使得十二月非但使得十二月亦復使得百千年非但使得百千年亦復使得無數劫非但使得無數劫亦復能轉無數劫乃至歸於此箇時非但能轉無數劫乃至歸於此箇時亦復能轉此箇時歸於這一念非但能轉此箇時歸於這一念亦復能將這一念當處出生隨處滅盡若只使得轉不得爭見吾心能為萬法主不逐三世遷自在受用之妙邪雖然若論衲僧巴鼻又不在此列僧供法衣請小參僧問昔日大庾嶺頭提不起如何今朝在這裏師云是誰恁麼道進云承古有言師云接響之流乃云須彌不挂寸絲虛空能容萬象有時喚作福田有時呼為心田施者受者且如何得相應去展衣云三世諸佛出世咸披此衣說法度生歷代祖師開堂亦披此衣說法利人天界今日既辦這棚傀儡不免著此花彩與諸人看莫道古人用底今人不取好中秋晚參普賢大士道諸供養中法供養最供養且置喚甚麼是法拈起月餅云莫是這箇麼是則杯盤狼籍脫或未然且看天上月水中月波蕩樣雲皎潔形影雖懸殊光明相交涉一月普現一切水一切水月一月攝若要入此境界須必到此時節非意解而可擬議豈思惟之所分別昔僧問投子青和尚月未圓時如何投云吞卻三箇四箇僧云圓後如何投云吐卻七箇八箇三箇與四箇七箇與八箇吞吐甚分明曾未咬得著然既吞吐分明為甚道咬不著僧問如何是月師云麻餅進云如何是指師云菱角進云月指兩忘時如何師云笑破石榴口進云恁麼則玩月已竟師云拄杖子且待別時喫小參道不遠人何者即是真不異俗就裏難明三十年行腳諸方壁立萬仞覓箇蹤跡不得阿呵呵毗婆尸佛早留心直至如今沒奈何壽昌雙峰和尚訃至小參訃音一聽便心驚設供拈香雨淚傾悲痛老成相繼往法門寥落倩誰撐雖然既入虎穴豈無虎子這便是我祖翁堂上第三十四世雙峰存法兄紹先啓後底面孔今向天界香煙堆裏相見罷獨唱還鄉別調詞小參豎拂子云文殊普賢觀音地藏來也諸人見麼見則事同一體如未不妨注破一則善說法要一則能行妙行一則慈悲廣大一則願力弘深直下檢點得出驅使自繇應以善說法要而得度者即遣善說法要而度脫之應以能行妙行而得度者即遣能行妙行而度脫之應以慈悲廣大而得度者即遣慈悲廣大而度脫之應以願力弘深而得度者即遣願力弘深而度脫之若撿點不出卻是諸人辜老僧即非老僧瞞諸人元宵小參燈月交輝灼破虛空面孔鑼鼓喧天穿徹大地耳門人人盡道鬧元宵還知觀世音菩薩只今在甚麼處呵呵大笑云眼見耳聞正好疑著小參舉道吾云高不在絶頂富不在福嚴樂不在天堂苦不在地獄相識滿天下知心能幾人徑山道我則不然高在絶頂富在福嚴樂在天堂苦在地獄誰知席帽下元是昔愁人天界又不然絶頂高福嚴富天堂樂地獄苦處處本現成頭頭沒張主若張主葉落花開春復秋日往月來今猶古且道三人一鼻是同是別臘月八日小參今朝是釋迦老子雪山六載一睹明星換卻從前眼目打失向上鼻孔底時節天下主其法席底勿論處之廣狹人之寡衆都要借此為題以便開口吐氣舉古拈今大家鬧鬨鬨底搬弄一場謂之上堂慶賀世尊成道山僧雖住名剎意在隱靜不攀這些條例秪有一則現成公案不妨與諸人落草盤桓庶幾時無虛度也此老初曰天下獨尊後道一切俱有還是同是別向這裏見得透徹分析清楚不愧為他嫡骨兒孫如或未然且向深固幽遠無人能到處大死一番過來始得小參師豎拂子云會麼這件事教不得學不得傳不得若教得依他作解若學得非己智分若傳得勿勞自參必須向當人腳跟下爆地一聲斷了命根死盡偷心無師自智覿體現前始知一切諸佛及諸佛法皆從我出我亦本空不住空相騰騰任運蕩蕩無為隨處稱尊遇緣利物設若盡大地三草二木各出問端不消拂子一揮一時酬畢諸人還會麼乃擲拂子云百千妙義皆他玩一段風光自出奇小參盤根錯節簇錦攢花利口辨詞尖新巧妙直饒道理上說得十分相應不若腳跟下踏著實處一步始不虛費草鞋錢不然整頓算零帳喫虧在後頭立夏小參一陽發百草增輝一霜降千峰失色寒時處處寒熱時人人熱流光風捲雲奔此事銀墻鐵壁欲出無路欲入無門汝既切切參學我亦的的指示轉法輪於烈火焰中翻全身於電光影裏脫或遲疑自成鈍滯爭怪得弘濟昔歸宗門下有箇僧半夜經行忽然大叫曰我悟也我悟也傍僧把住曰你悟箇甚麼其僧曰師姑元是女人做大抵古人說夢真實不虛撿點將來疑煞天下弘濟門下如有恁般底脫下汗衫痛與一頓使他腳跟下有箇落處去四月八日修藏社主佛上座小參師揮拂子云今朝是大吉良辰摩耶夫人別通一竅老婆心盡情剖露悉達太子突出全身小廝兒徹底風流直教九龍水洗不淨雲門棒打不開從昔至今年年此月此日勿論西乾東震繪像鏤形底承此時節都要向高處稱尊令人徹見本來面目豈知法身無為不墮諸數諸數既不墮喚甚麼作法身大衆會麼如未且於藏社殿裏瞻仰全軀思惟取足擲拂子下座中秋小參江上清風拂拂山中明月團團聞見本同一體聲光各自流傳弘濟今宵借此佳境與諸人舉揚箇事乃豎一指云看看還會麼認著老僧指頭失卻諸人眼目觀音庵主佛上座劉調元居士請小參師至佛前卓杖一下云觀音庵裏佛三尊鬧市場中僧一箇混跡和光指示人當機覿面休空過所以道有時將瓊樓寶閣作鐵壁銀山有時將虎穴龍宮作天堂佛國有時將一莖草作丈六身有時將盡大地作一微塵且道得甚麼消息便恁麼作用復卓拄杖云若人識得這東西信手拈來總不疑是法本無有上下更從何處覓高低小參坐斷千峰辜負先聖垂慈橫行鬧市屈辱從上宗風只饒隨緣而住未免混跡常情縱能擇處而居卻又自生分別且道畢竟如何始得入火無燒痕入水無濕跡豎起拂子云盡大地是箇鐵𪢬圇你作麼生穿鑿小參乾坤顛倒顛日月錯就錯何似山僧拄杖子峭巍巍兮活鱍鱍千眼大悲看不見八臂那吒摩不著雖然如是要用便用又曾瞞得那箇來小參卓拄杖一下復揮拂子云拄杖梗直拂子委宛應折伏者而折伏之應攝授者而攝授之或有孟八郎漢出來道彼既丈夫我亦爾拄杖拂子呵呵大笑曰只恐不是玉是玉也大奇小參打三打七惟此一事了得一事萬事俱畢不見古德道二因一有一亦莫守必須向百尺竿頭進步萬仞崖前撒手始知高不在天厚不在地只要拄杖子直下承當佛成道日小參年年臘月初七八一切妄想都凍煞自古從今悉達多天上人間稱釋迦所以道實須自立名要人傳雖然如是弘濟拄杖子未肯點頭在有名無實底從空挂起無名有實底就地放下名實兩全底二俱拈開名實并無底一齊擲卻且道拄杖子向甚麼處相見乃卓一卓云劍去久矣劉調元居士造西方三聖請小參彌陀觀音勢至三身一合理相大雄大願大悲無上無等無量堂堂乎容顏圓妙巍巍乎形體殊好湛湛乎光明廣大雖然如法稱讚未免猶有分別須從威音那畔坐斷三身向今世門頭廣行萬行到這裏生佛齊平昔今無異三世不隔毫端十方只在當念若千燈一室焰焰交輝一月千江光光互涉非先非後無間無礙靈靈不昧於尋常了了恆明於日用正所謂即心是佛非成不成無出不出興慈運悲非生示生無相現相茲調元劉居士乘夙願力示現受生從平等自性造殊勝妙相工完擇吉上座開光設供恭請山僧舉揚佛事普令他方此界瞻仰合掌禮拜低頭底應無所住而生其心共證本來智慧德相與佛不二大衆還知麼還會麼識得本來真面目何妨萬別與千差一毛頭上十方界諸佛衆生共一家小參破有法王出現於世隨衆生心而為開示破有且置還知開示箇甚麼莫是諸法不自生亦不從他生不共不無因是故說無生麼莫是業障本來無心差轉見殊若悟三空理何處不如如麼莫是一切有為法如夢幻泡影如露亦如電應作如是觀麼若只恁麼則當今多口阿師亦應詐此名頭其或別有長處且待木上座勘過始得
