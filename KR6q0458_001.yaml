body:
  text: 門人興林等編住金陵天界禪寺語録順治庚子八月十九日師於紫竹林受闔郡縉紳孝廉文學居士同諸山方丈耆宿監院等請住天界寺於九月十五日入院山門盡大地是箇善世法門都盧向甚麼處入驀卓拄杖云看腳下觀音殿慈悲為人有理圓通自在無礙三十二應現身隨類改頭換面且道即今在甚麼處咄彌勒殿拄杖煞活古今布袋收放天地是法本來平等一任逢場作戲大佛殿巍巍堂堂諸法中王明明歷歷出現於世十字街頭吼鐵牛孤峰頂上轟霹靂便禮拜祖師殿祖師眼睛衲僧巴鼻廝抑廝揚拋來擲去有甚麼了日震聲一喝據室據此室行此令肘後懸神符人來乞性命更有一則公案甚是淆訛驀豎拂子云聻上堂維那宣疏竟師指法座云這座虛架高臺亦是瓊樓寶閣亦是劍樹刀山若非罪福兩忘底誰敢挨著挨著則利害隨身山僧今日要登便登要坐便坐因甚得恁麼百無禁忌喝一喝便升拈香云此一瓣香乾坤正氣日月真光熱向爐中端為祝延今上皇帝聖躬萬歲播堯風於大地布舜澤於蒼生此一瓣香為國為家者未嘗不本此盡忠盡孝者全承這恩力熱向爐中奉為滿朝文武闔郡宰官孝廉文學居士等人人廣作佛事箇箇普利群生此一瓣香踏遍諸方玄路參詢直究根源博山會裏從空透露天界室中徹底掀翻藏身歐峰雲居遁跡匡廬巖壑自謂於世絶聞豈料年深月久卻被人知勉強出山事不獲已今日恭對人天衆前熱向爐中端為供養天界堂上傳曹洞正宗三十三世本師覺浪和尚用酬法乳之恩乃斂衣就座松影和尚白椎竟師豎拂子云會麼道人家風隱顯叵測有時向孤峰頂上盤結草庵任他春夏秋冬自繇自在有時向十字街頭撒開布袋隨我東西南北獨行獨步高下皆得其宜今日卻在天界寺裏受衆人請繼先師席掀翻洞水逆流唱出好山別調普利人天不拘軌則法堂前千衆圍繞也如是法堂前草深一丈也如是我為法王於法自在更有何事雖然秪如法幢初豎條令重新當陽一句作麼生道橫按莫邪全正令太平寰宇斬癡頑舉古德為人即不出出即不為人話師云大似一條拄杖二人扶雖然互相建立未免各見一邊秪如天界今日上堂說法還是出耶不出耶為人耶不為人耶具眼底試道看衆無語師擊拂子便下座禮東苑祖像東苑師翁面目奇如何想像畫成伊人皆瞻仰撩天鼻獨自稱尊挂劍眉雖然莫道鬍鬚赤更有赤鬍鬚禮天界先老人像水出石泉徹骨冷風過林花噴鼻香一度經懷一度噎半是賞心半斷腸向為孤峰絶侶寒暖自知雲漢獨尊恩冤莫報今既風生平地水到通渠龍象蹴踏而來車馬奔忙而至奈何一身入鬧市相逢八面盡鋒鋩逼拶得拄杖子覿體生光總只為你四十餘年賣不了底鹽醬禮傘居和尚像窮盡生平冷熱腸殷勤一戒未能忘知恩莫大應難報振起圓通古佛光所謂因風吹火用力不多借渠鼻孔與渠出氣聞思悟入三摩地戒定薰成五分香當晚小參璽長老一向高高山頂著腳深深海底垂手逢龍折角遇虎捋鬚猶未是拄杖子遊戲長處不意到來鬧市街頭平穩地上卻被人左逼右拶驅入善世法門又作麼生激揚重重波浪重重月疊疊峰巒疊疊雲落堂今日落堂無法可說拈則公案一齊勘過喚作祖師意無繩自縛不喚祖師意當面錯過總不與麼則終日河頭擔水賣歸家猶叫口乾渴臘月八日上堂僧問世尊今日成道拄杖今日化龍且道是同是別師云惟此一事實進云未睹明星時如何師云左眼半斤進云已睹明星時如何師云右眼八兩進云初曰天上天下惟吾獨尊後道一切衆生俱有如來智慧德相還是自語相違理合如是師云總與一頓棒乃云釋迦佛成道拄杖子化龍惟此一事實好日多犯重秪今諸上善人聚會天界炊鐵釘飯烹木札羹是為釋迦佛成道耶拄杖子化龍耶現前諸人試出道看道得著也與三十棒道不著也與三十棒何為如此不見世尊一睹明星極口歎曰奇哉奇哉一切衆生俱有如來智慧德相但以妄想執著不能得證拄杖子既與佛同時成化當與佛共鼻出氣大衆會麼遠離妄想及諸取令心所向皆無礙結制侍御陳旻昭居士給諫劉良弼居士同熊春臺衆居士設供請上堂僧問花笑鳥啼風和日暖春將半鳴鐘擊鼓結制升堂午正中十五前後即不問正當今日事如何師云花朝且喜值天晴進云秪如九旬禁足又作麼生相為師云若干鼻孔一杖穿僧左右顧云大衆好看婆心徹困處試聽風前鐵笛吹師云誰是知音僧禮拜云謝師答話師云好箇師僧又恁麼去乃云天界今春結制龍象如雲普聚若要大家明心須當各自努力古人道向上一路千聖不傳學者勞形似猿捕影天界長老特為今世門頭人舉揚威音那畔事若干鼻孔一杖穿腳下痛與棒三十總要皮裏有血底透玄機於劫外絶意路於今時獨露本具風光各得真實受用不更持金作丐把火覓燈窮露他方賃屋住不知誰是主人公薦亡上堂僧問萬戶春風信手拈和盤托獻法王前杖頭活句機先眼點出龍睛耀碧天龍睛即不問如何是機先眼師云一雨普潤進云恁麼則均霑法利去也師云你本分事如何進云學人禮拜和尚師云也須照顧鼻孔僧問無佛處不得住時如何師云頭角參天進云有佛處急走過時如何師云腳跟點地進云今日居士設供請和尚說法薦亡未審向甚麼處去師云天上天下進云憑師一滴曹溪水散作皇都遍地香師云閒言語乃卓杖云大好消息今日是岐瑞居士設供為薦亡叔明暘朱公請山僧舉揚般若普利存亡存亡且置般若作麼生舉昔僧問古宿動容揚古路不墮悄然機且道那箇有分那箇無分宿云有功者賞古人恁麼答話只知杖頭點額不解拂尾垂鉤如今有人問山僧動容揚古路不墮悄然機那箇有分那箇無分劈脊便打且道意在甚麼處復卓拄杖下座為衆職事上堂僧問教中道是法平等無有高下為甚萬仞峰頭底人卻在千尋海底相遇千尋海底底人卻向萬仞峰頭相逢師云是法平等無有高下進云恁麼則處處逢場作戲人人拄杖撩天師云你將甚麼作拄杖僧一喝師云喝與拄杖有甚交涉僧擬議師便打進云今日和尚為衆說法未審兩序有分別也無師云棒棒打著進云是賞是罰師云分明記取進云恁麼則依教奉行去也師云汝作麼生行進云但有利益無不興崇師豎拂子云你興崇得這箇麼僧便拜師云之乎者也乃云浩浩乾坤煌煌日月恢恢世界堂堂丈夫豈肯向虛空裏打斤斗縱能打出虛空之外更有虛空可打終不免落地一著且如何是落地一著卓杖云看腳下舉僧問睦州和尚如何是展演之言州云量才補職僧云如何是不展演之言州云伏惟尚饗徑山云睦州古佛善應來機雖然如是秪得八成或有人問徑山如何是展演之言便向他道問十答百有甚麼難如何是不展演之言喝一喝云且莫作屎窖沸師云徑山老漢答話雖俏其奈賣弄特過或有人問天界如何是展演之言便道法筵龍象衆當觀第一義如何是不展演之言便道諦觀法王法法王法如是大衆且如睦州道底被徑山撿點徑山道底被天界撿點天界道底莫有人撿點得麼長鯨一吸海水盡森森露出珊瑚枝居士祝髮請上堂僧問古人剷草為剃髮目今盡大地都是草先從那裏剷起師云從頭剷起進云頭在何處師豎起拂子進云尾在何處師擲下拂子進云恁麼則頭尾一如處乞師親剃落師將拂子一拂僧禮拜師云正直捨方便乃云帶髮呼為俗披緇喚作僧穿衣戴帽雖有異箇中無二主人公既知這些消息須當善自護持若要發揚此事不出尋常日用行住坐臥南北東西糞草堆頭教化泥水地上接引放開憨布袋笑殺傍觀逢人乞箇錢拈弄當面雖然佛事多端要先從頭做起唵悉殿都漫多羅因緣成就真實不虛入此法門安肯空過昔牛頭未見四祖時感百鳥銜花諸天送供及見四祖後肩挑一石背負八斗運米供衆日無虛度若不秉持僧行苦將何報答佛深恩久雨乍晴上堂僧問久雨不晴時如何師云箇箇拖泥帶水進云今日忽晴時如何師云人人去傘脫屐進云將晴未晴時如何師云轉見自倒自起進云為甚如此師云石頭路滑乃云天上興雲地下落雨紙傘木屐拖泥帶水志公杖頭挂剪尺趙老青州做布衫若作世諦理論太俗生若作佛法商量太僧生若只儱侗打之繞爭知二老之裁置已往事且放過只如今朝長空無點雲孤輪絶對待正當恁麼時又作麼生盤錯光影門頭著語易晴明日下隱身難上堂僧問撾鼓升堂即不問和尚未出方丈一句作麼生道師云大納乾坤闊進云恁麼則當陽一句絶中邊師云你向甚麼處見老僧進云兩眼對兩眼師云卻被老僧看破進云不辜親見和尚師云孟浪禪和僧問賓主五位即不問三玄三要意如何師云向源頭上薦取進云如何是第一玄師云露柱笑咍咍進云如何是第二玄師云階下石生臺進云如何是第三玄師云齊堂佛殿前進云如何是第一要師云古路無人到進云如何是第二要師云拶開沒孔竅進云如何是第三要師云拄杖分明道進云玄要蒙師親指示向上一路復如何師云赤腳踏青天乃驀豎拂子云機緣問答且置會得這箇麼如未為諸人下箇注腳惟一堅密身一切塵中現無性亦無相周遍於法界雖然過去諸佛末乎迦葉善逝未來諸佛先乎彌勒導師現在諸佛當乎釋迦世尊且喜今日普集天界平等光中各出廣長舌相遍覆大千世界異口同聲道汝等諸人行住坐臥莫離這箇若離這箇當面錯過錯過不錯過且置喚甚麼是這箇擲下拂子云不離當處常湛然覓即知君不可見道婆請上堂僧問高懸八卦圖坐斷諸方路請師直指箇中意師云嶺南消息若何僧一喝師云莫亂弄僧無語師便打僧轉身出師云野狐禪逞甚伎倆僧問杲日當空無處不照為甚這邊有那邊無師云循業發現進云學人則不然師云你又作麼生僧擬議師便打僧禮拜師云磕破骷髏當得麼乃云是覺非覺即念離念有心無心若惡若善一串穿來諸人算看算時若不識數盡是儱侗真如漢祖師道出息不涉衆緣入息不居陰界常轉如是經百千萬億遍萬億遍且放下喚甚麼作如是經昔有婆子請趙州和尚轉藏經州繞禪床一匝云轉藏竟婆云請和尚轉全藏為甚秪轉半藏全藏半藏且勿論未審轉底甚麼經秪如今日道婆請山僧舉揚般若且道山僧舉底與古人轉底還有分別也無良久云擇法要先具正眼弄潮須是入洪波上堂僧問狹路相逢時如何師云真對頭進云當面錯過時如何師云不相識進云驀直撞著布袋時如何師云與我一文錢進云這一文錢有何用處師云換人眼睛進云還換得虛空麼師云得進云虛空作麼生換師云北斗面南看進云果然於法自在師云降者放過乃云貌古形疏氣宇豪閒來鬧市弄金毛一聲震吼人皆畏走獸飛禽望影逃莫有向箭鋒下出頭底麼良久云雨打泥塗壁上堂僧問公案千差則且置如何是五家宗旨師將拄杖一卓進云莫儱侗師云逞你伎倆來進云如何是臨濟宗師豎起拄杖進云如何是曹洞宗師橫拈拄杖進云如何是雲門宗師將拄杖左邊一劃進云如何是溈仰宗師將拄杖右邊一劃進云如何是法眼宗師將拄杖向空一劃進云恁麼則歸源無二路方便有多門師云你離卻拄杖喚甚麼是歸源路僧豎一拳師云亦是方便門僧擬議師便打進云這等機用須是天界始得師又打云一任舉似諸方乃云這條拄杖盡大地誰不有一根只是他不解用遂成死水裏龍與蝦蟆魚鱉互相鈍置他若解用陸地生波沒殺天下頭角去在雖然也要拿捉得穩若拿捉未穩終不免被人奪卻大衆莫有奪得老僧拄杖底麼良久遂下座拈棒打散青原嘯峰和尚初忌上堂僧問