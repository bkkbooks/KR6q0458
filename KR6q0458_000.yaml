front:
  text: 目錄一卷天界上堂弘濟上堂小參二卷雲居示眾三卷機緣室中垂語小佛事行腳垂語佛祖贊歌偈行實附淨土詩方融璽禪師住天界語錄眾護法宰官請啟伏以秋月空懸光捲夜明簾不借涼飆桂發香飄無影樹重榮況燈王之餘燄交輝而善世之高門直立諸山俟響四眾瞻風恭惟方公大師毓秀終南分竹林之悲花戒月鍾奇滻水得天界之妙用神機把斷要津潛行密行昔領雲居十祀煥然堂構維新近住匡阜千岩渺矣煙霞增色忘機鹿艸息影雞紋為杖人後事遠來值嘯公高蹤繼往且棲霞及同門各錫飛一地此席豈應久虛迺成等於斯時共函啟片詞大法期將遠振吉占望日時屆仲秋座拂寶華聽雨花堂中露滴銀河之古翠爐燒沉水看毘盧閣上雲盤碧漢之新蒼還先師之公案現成斬末世之葛藤亂統朝陽再鳴於鳳嶺興雲復睹於龍河臨楮緘三和香合十不勝忻躍翹企之至佛弟子周天成鄧旭吳弘安劉餘謨黃國琦陸朗李皋方若珽王言劉餘㻰李文芳劉思敬危列宿陳世昌劉思問楊昌齡周土章孟瑄王端朱之鼎姜鼎沈豹陳丹衷同頓首拜眾護法孝廉文學請啟伏以一燈發燄燈燈相續無窮萬法同宗法法皆歸實際模範流芳於今日師資直接於當時恭惟方翁大師皎月臨淵清風拂水得少室不傳之旨分曹溪無盡之流瞬目揚眉己事全彰世外拈椎豎拂大機迥露當陽丁群情欲撼之秋藉中流而砥柱際一線將危之候挽末法於狂瀾潢等久已心皈無繇身近茲以天界因緣之合彌切人寰扳仰之忱松竹青蒼曲逕逶迤拄杖橫拈霄漢上雨煙朝暮半峰縹緲門庭直設畫圖間吟詠不減年潭泐翁拈提豈讓雪軒成老子承父業頭正尾端使末後光明炤天炤地施斬新條令打雨打風隨高步以周旋幾多龍象結勝因而廣遠如許香花缾錫儼臨人天交悅法弟王潢汪觀白夢鼐吳儀濤陸本胡禹冀王作礪陳宿姚世昌胡長庚王箴顧夢游錢匯楊國士應駟白夢鼎盧贄紀映鍾余懷黃棠芳張總楊泰詹淇陶敬宋嵋歐陽坤歐陽墧歐陽峻陳廷彝黃嘉善倪震倪霽凌翰凌文俞鑮年張雲蓀張雲蕗張雲蔚阮檉成必逵黃維嵩韓豫卞期發董純翼同頓首拜諸寺方丈暨眾耆宿請啟伏以祖印全提塗毒聲傳𤰪外法幢高豎栴檀香遍寰中向上機本無言而無示眾生願滿若見而若聞遐邇風趨人天景仰恭惟方翁大師挺生關內傑出涇陽標格外之玄機金針密度拔群迷之顛倒玉鎖重開獅子嚬呻眾獸自當息喙象王蹴踏野狐莫不潛蹤面命耳提佇巾瓶之飛詣風行草偃望法席之生輝今此名山夙稱禪窟盡是吾家種艸未嘗別立門庭拾博山爐內之鉗鎚入室頻來雲水飽杖者缽中之餘粒送供況有龍天顧以後生久坐其荒蕪時當末法茲焉宗旨再從昭揭運值重興琢煉松頭祈指雲巖之路拈提月下可參寶鏡之光協兼帶於正偏君臣位合該全攝於玄要賓主權分勿拘謙讓之懷得遂鄙私之請惠然至止曷勝欣忭臨楮無任顒仰之至教下弟覺爜普行明逵宗教妙光通旨性廣慧廣淨弘道合弘清大廣慶習宗鏡照識成彬普悅本𡊀寂恬常進大振同頓首拜監院請啟伏以靈孕太華具一隻之正眼別傳大好昭百代之真宗敬迓威儀渴思建立恭惟方翁和尚雲居發軔天吩傳衣法雨霏霏自爾遍滋宇宙慈雲靄靄從來普被山林緣熟三吳遊經幾度十載與君把臂敢謂同參今朝為眾安心請居師位顛倒風旛拈舊句融通水乳引新機輪乃庸流實如敝帚輔先人一十八稔慚無寸尺之功監破院今已九年愧乏振興之力懼漆桶之底難脫不肯承當學願王之行方深秪知精進因集法護更申誓言敗壁頹垣必望鼎新異日攢花簇錦自當媲美先朝齒德俱尊宜鑪錘於此地壎箎迭奏開聾瞽於四方所冀裕後光前乃慰深情遠慮赴眾籲如士赴海潮之音援群頑如世尊援最小之弟立見截狐種族恒觀踏佛頂𩕳俯竭葵忱仰千蓮座謹啟監院大輪頓首和南
